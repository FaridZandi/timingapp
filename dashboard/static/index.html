<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Activity Timeline</title>
  <link rel="stylesheet" href="/styles.css?v=20260716-phase5">
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">Activity Probe</p>
        <h1>Timeline</h1>
      </div>
      <div class="controls">
        <div class="day-navigation" aria-label="Day navigation">
          <button id="previous-day" type="button" title="Previous recorded day">‹</button>
          <label>
            Day
            <select id="day"></select>
          </label>
          <button id="next-day" type="button" title="Next recorded day">›</button>
        </div>
        <button id="today" type="button">Today</button>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <p id="status" class="status">Loading observations…</p>

    <section class="workspace">
      <div class="card timeline-card" aria-labelledby="timeline-heading">
        <div class="section-heading">
          <div>
            <h2 id="timeline-heading">Observed time</h2>
            <p id="range"></p>
          </div>
          <div class="view-toggle" aria-label="Timeline view">
            <button id="day-view" type="button" aria-pressed="true">Day</button>
            <button id="week-view" type="button" aria-pressed="false">Week</button>
          </div>
          <div class="timeline-controls" aria-label="Timeline zoom controls">
            <button id="zoom-out" type="button" title="Zoom out">−</button>
            <button id="zoom-in" type="button" title="Zoom in">+</button>
            <button id="fit-activity" type="button">Fit</button>
            <button id="full-day" type="button">Day</button>
          </div>
        </div>
        <div id="timeline-filter" class="timeline-filter" hidden>
          <span>Showing <strong id="timeline-filter-app"></strong></span>
          <button id="clear-app-filter" type="button">Clear filter</button>
        </div>
        <div id="week-day-labels" class="week-day-labels" hidden></div>
        <div
          id="timeline"
          class="timeline"
          title="Scroll to zoom; drag empty space to pan"
        >
          <div id="axis" class="axis"></div>
          <div class="timeline-rail"></div>
          <div id="axis-selection" class="axis-selection" hidden></div>
          <div id="blocks" class="blocks"></div>
        </div>
        <p id="total" class="timeline-total"></p>
      </div>

      <aside id="detail" class="card detail-card">
        <div id="detail-empty" class="detail-empty">
          <span>↖</span>
          <h2 id="detail-empty-title">Select an activity</h2>
          <p id="detail-empty-description">Click a block to inspect its window-level subactivities.</p>
        </div>
        <div id="detail-content" class="detail-content" hidden>
          <div class="detail-accent" id="detail-accent"></div>
          <p class="eyebrow">Activity details</p>
          <h2 id="detail-app"></h2>
          <p id="detail-meta" class="detail-meta"></p>
          <button id="add-google-calendar" class="calendar-button" type="button">
            Add to Google Calendar
          </button>
          <p id="calendar-status" class="calendar-status" role="status"></p>
          <div class="detail-rule"></div>
          <div class="detail-heading">
            <h3>Subactivities</h3>
            <span id="detail-count"></span>
          </div>
          <div id="subactivities" class="subactivities"></div>
        </div>
      </aside>
    </section>

    <section class="card daily-summary" aria-labelledby="daily-summary-heading">
      <div class="summary-header">
        <div>
          <p class="eyebrow">Daily aggregate</p>
          <h2 id="daily-summary-heading">Day summary</h2>
        </div>
        <p id="summary-date" class="summary-date"></p>
      </div>
      <div id="summary-metrics" class="summary-metrics"></div>
      <div class="summary-breakdown-heading">
        <h3>Applications</h3>
        <span id="summary-app-count"></span>
      </div>
      <div id="summary-apps" class="summary-apps"></div>
    </section>
  </main>

  <script src="/app.js?v=20260716-phase5"></script>
</body>
</html>
